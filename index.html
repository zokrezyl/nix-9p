<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nix 9p - JSLinux</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; }
        #term_wrap { display: none; margin: 0 auto; }
        #term_bar {
            background: #222; padding: 4px 8px; font-size: 13px;
            display: flex; align-items: center; justify-content: space-between;
        }
        #net_progress { visibility: hidden; color: #ff0; font-size: 12px; }
        #term_container { background: #000; }
        #term_paste { position: absolute; left: -9999px; }
    </style>
</head>
<body>
    <div id="term_wrap">
        <div id="term_bar">
            <span>Nix 9p - Alpine Linux (x86_64)</span>
            <span id="net_progress">downloading...</span>
        </div>
        <div id="term_container"></div>
        <textarea id="term_paste"></textarea>
    </div>

    <script src="term.js"></script>
    <script>
        // Define get_params before jslinux.js overwrites it - jslinux.js will replace this,
        // but we redirect to include params in URL if not present
        (function() {
            var query = window.location.search;
            if (query.indexOf("url=") === -1) {
                // Redirect with default parameters in URL
                var newUrl = window.location.pathname + "?cpu=x86_64&url=nix-9p.cfg&mem=256";
                if (query) {
                    newUrl += "&" + query.substring(1);
                }
                window.location.replace(newUrl);
            }
        })();
    </script>
    <script src="jslinux.js"></script>
</body>
</html>
